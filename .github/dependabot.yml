version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: cron
      cron: "23 4 7 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - matz694
    versioning-strategy: increase
    cooldown:
      default: 7
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cron: "45 4 14 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - matz694
